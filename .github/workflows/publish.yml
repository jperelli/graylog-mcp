name: Publish

# Publishes to npm when a GitHub Release is published. Create the release from a
# tag like `v2.1.0` (matching the version in package.json) and this workflow
# builds, tests, and publishes with npm provenance.
on:
  release:
    types: [published]

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm provenance — mints the OIDC token that proves this
      # package was built here, surfacing the "Published with provenance" badge.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify the release tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Release tag ($TAG) does not match package.json version ($PKG)." \
                 "Bump the version and retag before releasing."
            exit 1
          fi

      - name: Run smoke tests
        run: npm test

      # Trusted publishing (OIDC) needs a recent npm; the Node-bundled one is older.
      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      # No token: authentication is OIDC (trusted publishing), which is why the job
      # has `id-token: write`. That same OIDC identity also signs provenance
      # automatically, so no --provenance flag is needed. --access public is
      # required the first time a scoped package (@jperelli/*) is published.
      - name: Publish
        run: npm publish --access public
